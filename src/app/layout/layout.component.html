<div class="layout-wrapper" [class.sidebar-collapsed]="collapsed" [class.mobile-open]="mobileOpen">

  <!-- Backdrop — solo visible en móvil cuando el sidebar está abierto -->
  <div class="sidebar-backdrop" (click)="closeMobile()"></div>

  <app-sidebar
    [collapsed]="collapsed"
    (toggleSidebar)="toggle()">
  </app-sidebar>

  <div class="layout-main">

    <app-topbar
      [sidebarCollapsed]="collapsed"
      (toggleSidebar)="toggle()">
    </app-topbar>

    <main class="layout-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
