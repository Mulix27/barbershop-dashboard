<aside class="sidebar" [class.collapsed]="collapsed && !isMobile">
  <div class="sidebar-logo">
    <div class="logo-mark" [class.has-logo]="barbershopLogoUrl">
      <img *ngIf="barbershopLogoUrl" [src]="barbershopLogoUrl" [alt]="barbershopName"/>
      <i *ngIf="!barbershopLogoUrl" class="pi pi-tag"></i>
    </div>
    <div class="logo-text" *ngIf="!collapsed || isMobile">
      <span class="shop-name">{{ barbershopName }}</span>
      <span class="shop-label">BARBER SHOP</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of visibleItems"
      class="nav-item"
      [class.active]="isActive(item.route)"
      [routerLink]="item.route"
      [pTooltip]="collapsed && !isMobile ? item.label : ''"
      tooltipPosition="right"
      appendTo="body"
      tooltipStyleClass="sidebar-tooltip"
    >
      <i class="pi {{ item.icon }}"></i>
      <span class="nav-label" *ngIf="!collapsed || isMobile">{{ item.label }}</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info" *ngIf="!collapsed || isMobile">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-meta">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
    </div>
    <div
      class="user-avatar solo"
      *ngIf="collapsed && !isMobile"
      [pTooltip]="userName"
      tooltipPosition="right"
    >
      {{ userInitials }}
    </div>
    <div class="footer-divider"></div>
    <button
      class="logout-btn"
      (click)="logout()"
      [pTooltip]="collapsed && !isMobile ? 'Cerrar sesión' : ''"
      tooltipPosition="right"
    >
      <i class="pi pi-sign-out"></i>
      <span *ngIf="!collapsed || isMobile">Cerrar sesión</span>
    </button>
  </div>
</aside>
