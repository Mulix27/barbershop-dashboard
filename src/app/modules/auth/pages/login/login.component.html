<p-toast position="top-center"></p-toast>

<div class="login-page">

  <!-- Fondo decorativo -->
  <div class="login-bg">
    <div class="bg-pattern"></div>
    <div class="bg-diamond"></div>
    <div class="bg-glow"></div>
  </div>

  <!-- Card central -->
  <div class="login-card">


    <h1 class="login-title">Bienvenido de vuelta</h1>
    <p class="login-subtitle">Inicia sesión para gestionar tu barbería</p>

    <!-- Formulario -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-envelope"></i>
          <input
            id="email"
            type="email"
            pInputText
            formControlName="email"
            placeholder="tu@barberia.com"
            class="w-full"
            [class.ng-invalid]="emailCtrl.invalid && emailCtrl.touched"/>
        </span>
        <small class="field-error" *ngIf="emailCtrl.invalid && emailCtrl.touched">
          Ingresa un email válido
        </small>
      </div>

      <!-- Contraseña -->
      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          placeholder="••••••••"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          [class.ng-invalid]="passwordCtrl.invalid && passwordCtrl.touched">
        </p-password>
        <small class="field-error" *ngIf="passwordCtrl.invalid && passwordCtrl.touched">
          La contraseña es requerida
        </small>
      </div>

      <!-- Recordarme -->
      <div class="field-row">
        <div class="remember-me">
          <p-checkbox
            formControlName="remember"
            [binary]="true"
            inputId="remember"
            label="Recordarme">
          </p-checkbox>
        </div>
      </div>

      <!-- Botón -->
      <p-button
        type="submit"
        label="Iniciar sesión"
        styleClass="w-full login-btn"
        [loading]="loading"
        [disabled]="form.invalid || loading">
      </p-button>

    </form>

    <!-- Footer -->
    <p class="login-footer">
      ¿Nuevo en la plataforma?
      <a href="mailto:soporte@barbershopsaas.com">Contacta al administrador</a>
    </p>

  </div>

</div>
